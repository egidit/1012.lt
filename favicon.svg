<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <!-- glow backdrop -->
  <circle cx="16" cy="16" r="8" fill="#ffffff" opacity="0.06"/>
  <!-- 10 -->
  <text x="5" y="24" font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="22" fill="#ffffff" letter-spacing="-1">10</text>
  <!-- glitch offset slice -->
  <rect x="0" y="12" width="32" height="3" fill="#0a0a0a" opacity="0.5"/>
  <text x="6.5" y="24" font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="22" fill="#d4cec3" letter-spacing="-1" clip-path="url(#slice)" opacity="0.4">10</text>
  <defs>
    <clipPath id="slice"><rect x="0" y="12" width="32" height="3"/></clipPath>
  </defs>
</svg>
